<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Thank You</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to bottom, #87CEEB, #BFEFFF, #F8F1D4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {

            max-width: 700px;
            width: 100%;
            padding: 40px;
            border-radius: 15px;

        }
    </style>

</head>

<body>

    <div class="card shadow">

        <h1 class="text-success text-center">
            ✅ Thank You!
        </h1>

        <hr>

        <h4>Your submission has been received.</h4>

        <p><strong>Name:</strong> <span id="displayName"></span></p>

        <p><strong>Email:</strong> <span id="displayEmail"></span></p>

        <p><strong>Favourite Fish:</strong> <span id="displayFish"></span></p>

        <p><strong>Message:</strong></p>

        <p id="displayMessage"></p>

        <div class="text-center mt-4">

            <a href="index.html" class="btn btn-primary">

                Back to Home

            </a>

        </div>

    </div>

    <script>

        document.getElementById("displayName").textContent =
            localStorage.getItem("name");

        document.getElementById("displayEmail").textContent =
            localStorage.getItem("email");

        document.getElementById("displayFish").textContent =
            localStorage.getItem("fish");

        document.getElementById("displayMessage").textContent =
            localStorage.getItem("message");

    </script>

</body>

</html>
