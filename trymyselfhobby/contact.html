<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Contact Me</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to bottom, #87CEEB, #BFEFFF, #F8F1D4);
            min-height: 100vh;
        }

        .contact-box {

            max-width: 700px;
            margin: 60px auto;

            background: white;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0 8px 25px rgba(0, 0, 0, .15);

        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold" href="official.html">

                🎣 Fishing Paradise

            </a>

            <div class="navbar-nav ms-auto">

                <a class="nav-link" href="official.html">Home</a>

                <a class="nav-link active" href="contact.html">Contact</a>

            </div>

        </div>

    </nav>

    <div class="contact-box">

        <h2 class="text-center mb-4">

            Contact Me

        </h2>

        <form id="contactForm">

            <div class="mb-3">

                <label class="form-label">

                    Name

                </label>

                <input type="text" class="form-control" id="name" placeholder="Enter your name">
            </div>

            <div class="mb-3">

                <label class="form-label">

                    Email

                </label>

                <input type="email" class="form-control" id="email" placeholder="Enter your email">
            </div>

            <div class="mb-3">

                <label class="form-label">

                    Favourite Fish

                </label>

                <select class="form-select" id="fish">
                    <option>Pomfret</option>

                    <option>Grouper</option>

                    <option>Sea Bass</option>

                    <option>Others</option>

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Message

                </label>

                <textarea class="form-control" id="message" rows="5" placeholder="Write your message..."></textarea>
            </div>

            <div class="d-grid">

                <button type="submit" class="btn btn-primary btn-lg">
                    Submit

                </button>

            </div>

        </form>

    </div>
    <script>

        document.getElementById("contactForm").addEventListener("submit", function (event) {

            event.preventDefault();

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let fish = document.getElementById("fish").value;
            let message = document.getElementById("message").value.trim();

            if (name == "" || email == "" || message == "") {

                alert("Please fill in all fields.");

                return;

            }

            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(email)) {

                alert("Please enter a valid email.");

                return;

            }

            localStorage.setItem("name", name);
            localStorage.setItem("email", email);
            localStorage.setItem("fish", fish);
            localStorage.setItem("message", message);

            window.location.href = "response.html";

        });

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
